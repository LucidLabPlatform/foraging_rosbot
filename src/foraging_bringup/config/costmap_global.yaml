# Reff: http://wiki.ros.org/costmap_2d
global_costmap:
  global_frame: map
  robot_base_frame: base_link

  update_frequency: 2.0
  publish_frequency: 1.0

  # Allow up to 3 seconds for the map frame to appear (gmapping publishes every ~2s)
  transform_tolerance: 3.0

  static_map: true
  rolling_window: false

  width: 15.0
  height: 15.0
  resolution: 0.05