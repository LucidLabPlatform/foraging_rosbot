global_frame: map
robot_base_frame: base_link

footprint: [[0.14, 0.14], [0.14, -0.14], [-0.14, -0.14], [-0.14, 0.14]]
footprint_padding: 0.03

rolling_window: true
track_unknown_space: true

plugins:
  - {name: static_layer,    type: "costmap_2d::StaticLayer"}
  - {name: obstacle_layer,  type: "costmap_2d::ObstacleLayer"}
  - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

obstacle_layer:
  enabled: true
  track_unknown_space: true
  combination_method: 1
  observation_sources: scan puck_cloud

  scan:
    topic: /scan
    data_type: LaserScan
    marking: true
    clearing: true
    sensor_frame: laser
    obstacle_range: 2.5
    raytrace_range: 2.5

  puck_cloud:
    topic: /puck/as_obstacles
    data_type: PointCloud2
    marking: true
    clearing: false
    observation_persistence: 3.0
    expected_update_rate: 0.0
    min_obstacle_height: 0.0
    max_obstacle_height: 0.40
    obstacle_range: 20.0
    raytrace_range: 0.0
    inf_is_valid: false

inflation_layer:
  enabled: true
  cost_scaling_factor: 3.0
  inflation_radius: 0.30