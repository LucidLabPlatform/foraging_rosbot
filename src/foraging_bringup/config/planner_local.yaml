# Reff: http://wiki.ros.org/base_local_planner
base_local_planner: base_local_planner/TrajectoryPlannerROS

TrajectoryPlannerROS:
    min_vel_x: 0.05
    max_vel_x: 0.12
    min_vel_theta: -0.3
    max_vel_theta: 0.3
    min_in_place_vel_theta: 0.25
    escape_vel: 0.0

    acc_lim_theta: 0.5
    acc_lim_x: 0.5

    holonomic_robot: false

    xy_goal_tolerance: 0.15
    yaw_goal_tolerance: 0.5

    meter_scoring: true
    path_distance_bias: 8
    goal_distance_bias: 20
    occdist_scale:  0.01

    sim_time: 3.0
